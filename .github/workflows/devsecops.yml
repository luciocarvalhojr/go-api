name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Test
        run: go test -v -race -cover ./...

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Run Gosec (SAST)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.23.0
          gosec ./...

      - name: Run Govulncheck (SCA)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  docker-scan:
    runs-on: ubuntu-latest
    needs: [test-and-lint, security-scan]
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker Image
        run: docker build -t go-api:${{ github.sha }} .

      - name: Run Trivy (Image Scan)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'go-api:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
